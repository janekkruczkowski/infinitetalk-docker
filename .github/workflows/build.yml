name: Build InfiniteTalk Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost && sudo docker image prune -af
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/infinitetalk:vast
          cache-from: type=gha,scope=vast
          cache-to: type=gha,mode=max,scope=vast

  runpod:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost && sudo docker image prune -af
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runpod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/infinitetalk:runpod
          cache-from: type=gha,scope=runpod
          cache-to: type=gha,mode=max,scope=runpod
