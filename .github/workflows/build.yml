name: Build InfiniteTalk Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (aggressive)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Show disk
        run: df -h /

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/infinitetalk:vast
            ghcr.io/${{ github.repository_owner }}/infinitetalk:latest
            ghcr.io/${{ github.repository_owner }}/infinitetalk:v2
          cache-from: type=gha,scope=vast
          cache-to: type=gha,mode=max,scope=vast
